<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcana</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #04010a;
            background-image: linear-gradient(180deg, #020104 0%, #080312 50%, #020104 100%);
            color: #f3e8ff;
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            padding: 0; margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 25px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 50px;
            z-index: 100;
        }
        .btn-volver {
            background: rgba(15, 4, 35, 0.9);
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 6px;
            color: #d4af37;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-volver:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            background: rgba(212, 175, 55, 0.15);
        }

        .icono-app-contenedor {
            width: 90px;
            height: 90px;
            margin: 0 auto;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(14, 5, 30, 0.85);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            overflow: hidden;
        }
        .icono-app-contenedor img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-area { 
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .app-container.modo-consulta-activa .logo-area {
            display: none !important;
        }

        h1.marca-titulo {
            color: #d4af37; 
            font-family: 'Cinzel Decorative', serif;
            font-size: 4rem; 
            margin: 0; 
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .instruccion-directa {
            color: #d4af37;
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin: 15px 0 5px 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .vista-seccion { display: none; flex-direction: column; gap: 30px; width: 100%; }
        .activa { display: flex; }

        .selector-idioma-inicio {
            margin: 10px auto;
            max-width: 300px;
            text-align: center;
        }
        .selector-idioma-inicio select {
            width: 100%; background: #070314; border: 2px solid rgba(212, 175, 55, 0.5);
            color: #fff; padding: 12px; font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; outline: none; border-radius: 6px;
        }

        .menu-contenedor { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            margin-top: 10px; 
            max-width: 600px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
        }
        .menu-card {
            background: rgba(14, 5, 30, 0.85); 
            border: 2px solid rgba(212, 175, 55, 0.35); 
            border-bottom: 5px solid rgba(212, 175, 55, 0.6);
            padding: 45px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s; 
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .menu-card:hover { border-color: #d4af37; background: rgba(45, 12, 95, 0.45); transform: translateY(-3px); }
        .card-titulo { font-size: 2.5rem; color: #d4af37; letter-spacing: 4px; }

        .config-ritual-area { display: flex; flex-direction: column; gap: 25px; margin-top: 15px; max-width: 550px; margin-left: auto; margin-right: auto; width: 100%; }
        .selector-caja { text-align: left; border-bottom: 2px dashed rgba(212, 175, 55, 0.3); padding-bottom: 15px; }
        .selector-caja label { display: block; font-size: 1.5rem; color: #d4af37; margin-bottom: 12px; }
        .selector-caja select {
            width: 100%; background: #070314; border: 2px solid rgba(212, 175, 55, 0.5);
            color: #fff; padding: 18px; font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; outline: none; border-radius: 6px;
        }

        .contenedor-altar-abanicos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            max-width: 1100px;
            margin: 20px auto 60px auto;
            justify-content: center;
            align-items: center;
        }
        
        .carta-tarot-real {
            width: 65px;
            height: 115px;
            background: linear-gradient(135deg, #1d0b3a 0%, #05020a 100%);
            border: 2px solid #4c1d95;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: -3px 3px 8px rgba(0,0,0,0.7);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .carta-tarot-real::after {
            content: '✦'; display: flex; justify-content: center; align-items: center; height: 100%;
            color: rgba(212, 175, 55, 0.25); font-size: 1rem;
        }
        
        .carta-tarot-real.elegida-ritual {
            transform: scale(0.9) !important;
            border-color: #d4af37;
            background: #3b0764;
            box-shadow: 0 0 15px #d4af37;
            opacity: 0.3;
            pointer-events: none;
        }

        .resultado-cartas { display: flex; justify-content: center; gap: 25px; margin: 30px 0; flex-wrap: wrap; }
        
        .carta-revelada {
            width: 170px; height: 320px; background: #06020c; border: 2px solid #d4af37; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 8px; box-sizing: border-box; box-shadow: 0 12px 35px rgba(0,0,0,0.95);
            opacity: 0; animation: develaCarta 0.6s ease forwards;
            overflow: hidden;
        }
        
        .wrapper-imagen-tarot {
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            background: #110724;
        }
        .wrapper-imagen-tarot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carta-revelada.es-invertida img {
            transform: rotate(180deg);
        }

        .carta-revelada .nombre-c {
            font-weight: 700; color: #d4af37; font-size: 1rem; text-align: center; 
            line-height: 1.2; margin-top: 5px; height: 34px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .carta-revelada .tag-orientacion {
            font-size: 0.75rem; font-family: sans-serif; letter-spacing: 1px; margin-top: 2px;
        }
        .tag-orientacion.txt-derecho { color: #34d399; }
        .tag-orientacion.txt-alreves { color: #f87171; }
        
        .caja-interpretacion {
            background: rgba(5, 2, 12, 0.95); border: 2px solid rgba(212, 175, 55, 0.4);
            border-top: 5px solid #d4af37; border-radius: 6px;
            padding: 25px; text-align: left; font-size: 1.2rem;
            line-height: 1.8; max-width: 750px; margin: 0 auto; max-height: 350px; overflow-y: auto;
        }
        .caja-interpretacion p { margin: 0 0 15px 0; }

        .ads-box { background: rgba(0,0,0,0.3); border-top: 1px dashed rgba(212, 175, 55, 0.2); padding: 15px; color: #a78bfa; font-size: 1rem; margin-top: auto; }

        @keyframes develaCarta { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="audio-musica" loop autoplay src="musica-fondo.MP3"></audio>
    <audio id="audio-cuenco" src="sound-cuenco.mp3"></audio>

    <div class="app-container" id="contenedor-global">
        
        <div class="top-bar">
            <div id="zona-volver"></div>
        </div>

        <div class="logo-area">
            <div class="icono-app-contenedor">
                <img src="fondo-arcana.jpg" alt="Arcana Logo">
            </div>
            <h1 class="marca-titulo">ARCANA</h1>
        </div>

        <div id="pantalla-menu" class="vista-seccion activa">
            <div class="selector-idioma-inicio">
                <select id="tarot-idioma" onchange="actualizarTextosGlobales()">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                    <option value="pt">Português</option>
                    <option value="fr">Français</option>
                    <option value="it">Italiano</option>
                </select>
            </div>
            <div class="menu-contenedor">
                <div class="menu-card" onclick="intentarActivarAudio(); abrirTarotConfig()">
                    <div id="txt-menu-tarot" class="card-titulo">Tarot</div>
                </div>
            </div>
        </div>

        <div id="pantalla-tarot-config" class="vista-seccion">
            <div class="config-ritual-area">
                <div class="selector-caja">
                    <label id="lbl-mazo">Mazo:</label>
                    <select id="tarot-mazo-elegido">
                        <option value="rider">Rider-Waite</option>
                        <option value="marsella">Marsella</option>
                        <option value="egipcio">Egipcio</option>
                        <option value="gitano">Gitano</option>
                        <option value="celta">Celta</option>
                    </select>
                </div>
                <div class="selector-caja">
                    <label id="lbl-cantidad">Cantidad de cartas:</label>
                    <select id="tarot-tipo">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                    </select>
                </div>
            </div>
            <button class="btn-volver" id="btn-comenzar" onclick="comenzarRitualTarot()" style="margin-top:25px; font-size:1.4rem; padding:15px;">CONSULTAR</button>
        </div>

        <div id="pantalla-tarot-tablero" class="vista-seccion">
            <div class="instruccion-directa" id="txt-contador-instruccion"></div>
            <div class="contenedor-altar-abanicos" id="altar-abanicos-completo"></div>
        </div>

        <div id="pantalla-tarot-resultado" class="vista-seccion">
            <div class="resultado-cartas" id="caja-cartas-reveladas"></div>
            <div class="caja-interpretacion" id="texto-interpretacion"></div>
            <button class="btn-volver" id="btn-nueva" onclick="abrirTarotConfig()" style="padding:15px; font-size:1.3rem; margin-top:25px;">NUEVA CONSULTA</button>
        </div>

        <div class="ads-box">ESPACIO RESERVADO PARA GOOGLE ADSENSE</div>
    </div>

    <script>
        let cartasRequeridas = 3;
        let cartasSeleccionadasIndices = [];
        let mazoMezcladoConPosicion = [];

        // TRADUCCIONES COMPLETAS PARA LOS 5 IDIOMAS
        const textosIdiomas = {
            es: { tituloMenu: "Tarot", eligeUna: "Elige tu carta", eligeVarias: "Elige tus cartas", derecho: "Derecha", alreves: "Invertida", nueva: "NUEVA CONSULTA", consultar: "CONSULTAR", mazo: "Mazo:", cantidad: "Cantidad de cartas:" },
            en: { tituloMenu: "Tarot", eligeUna: "Choose your card", eligeVarias: "Choose your cards", derecho: "Upright", alreves: "Reversed", nueva: "NEW READING", consultar: "READ CARDS", mazo: "Deck:", cantidad: "Card Amount:" },
            pt: { tituloMenu: "Tarot", eligeUna: "Escolha sua carta", eligeVarias: "Escolha suas cartas", derecho: "Direita", alreves: "Invertida", nueva: "NOVA CONSULTA", consultar: "CONSULTAR", mazo: "Baralho:", cantidad: "Quantidade de cartas:" },
            fr: { tituloMenu: "Tarot", eligeUna: "Choisissez votre carte", eligeVarias: "Choisissez vos cartes", derecho: "Droit", alreves: "Inversée", nueva: "NOUVELLE CONSULTATION", consultar: "CONSULTER", mazo: "Jeu:", cantidad: "Nombre de cartes:" },
            it: { tituloMenu: "Tarot", eligeUna: "Scegli la tua carta", eligeVarias: "Scegli le tue carte", derecho: "Dritto", alreves: "Capovolta", nueva: "NUOVA CONSULTA", consultar: "CONSULTA", mazo: "Mazzo:", cantidad: "Quantità di carte:" }
        };

        // BASE DE DATOS REAL CON LOS 78 ARCANOS EN LOS 5 IDIOMAS
        const baseDeDatosTarot = [];
        
        const nombresArcanosMayores = [
            {es:"El Loco", en:"The Fool", pt:"O Louco", fr:"Le Mat", it:"Il Matto"},
            {es:"El Mago", en:"The Magician", pt:"O Mago", fr:"Le Bateleur", it:"Il Bagatto"},
            {es:"La Sacerdotisa", en:"The High Priestess", pt:"A Sacerdotisa", fr:"La Papesse", it:"La Papessa"},
            {es:"La Emperatriz", en:"The Empress", pt:"A Imperatriz", fr:"L'Impératrice", it:"L'Imperatrice"},
            {es:"El Emperador", en:"The Emperor", pt:"O Imperador", fr:"Le Empereur", it:"L'Imperatore"},
            {es:"El Hierofante", en:"The Hierophant", pt:"O Hierofante", fr:"Le Pape", it:"Il Papa"},
            {es:"Los Enamorados", en:"The Lovers", pt:"Os Enamorados", fr:"L'Amoureux", it:"Gli Amanti"},
            {es:"El Carro", en:"The Chariot", pt:"O Carro", fr:"Le Chariot", it:"Il Carro"},
            {es:"La Fuerza", en:"Strength", pt:"A Força", fr:"La Force", it:"La Forza"},
            {es:"El Ermitaño", en:"The Hermit", pt:"O Eremita", fr:"L'Ermite", it:"L'Eremita"},
            {es:"La Rueda de la Fortuna", en:"The Wheel of Fortune", pt:"A Roda da Fortuna", fr:"La Roue de Fortune", it:"La Ruota della Fortuna"},
            {es:"La Justicia", en:"Justice", pt:"A Justiça", fr:"La Justice", it:"La Giustizia"},
            {es:"El Colgado", en:"The Hanged Man", pt:"O Enforcado", fr:"Le Pendu", it:"L'Appeso"},
            {es:"La Muerte", en:"Death", pt:"A Morte", fr:"La Mort", it:"La Morte"},
            {es:"La Templanza", en:"Temperance", pt:"A Templança", fr:"Tempérance", it:"La Temperanza"},
            {es:"El Diablo", en:"The Devil", pt:"O Diabo", fr:"Le Diable", it:"Il Diavolo"},
            {es:"La Torre", en:"The Tower", pt:"A Torre", fr:"La Maison Dieu", it:"La Torre"},
            {es:"La Estrella", en:"The Star", pt:"A Estrela", fr:"L'Étoile", it:"La Stella"},
            {es:"La Luna", en:"The Moon", pt:"A Lua", fr:"La Lune", it:"La Luna"},
            {es:"El Sol", en:"The Sun", pt:"O Sol", fr:"Le Soleil", it:"Il Sole"},
            {es:"El Juicio", en:"Judgement", pt:"O Julgamento", fr:"Le Jugement", it:"Il Giudizio"},
            {es:"El Mundo", en:"The World", pt:"O Mundo", fr:"Le Monde", it:"Il Mondo"}
        ];

        const palos = [
            {es:"Bastos", en:"Wands", pt:"Paus", fr:"Bâton", it:"Bastoni"},
            {es:"Copas", en:"Cups", pt:"Copas", fr:"Coupe", it:"Coppe"},
            {es:"Espadas", en:"Swords", pt:"Espadas", fr:"Épée", it:"Spade"},
            {es:"Oros", en:"Coins", pt:"Ouros", fr:"Denier", it:"Denari"}
        ];

        const cartasNumero = [
            {es:"As de ", en:"Ace of ", pt:"Ás de ", fr:"As de ", it:"Asso di "},
            {es:"2 de ", en:"2 of ", pt:"2 de ", fr:"2 de ", it:"2 di "},
            {es:"3 de ", en:"3 of ", pt:"3 de ", fr:"3 de ", it:"3 di "},
            {es:"4 de ", en:"4 of ", pt:"4 de ", fr:"4 de ", it:"4 di "},
            {es:"5 de ", en:"5 of ", pt:"5 de ", fr:"5 de ", it:"5 di "},
            {es:"6 de ", en:"6 of ", pt:"6 de ", fr:"6 de ", it:"6 di "},
            {es:"7 de ", en:"7 of ", pt:"7 de ", fr:"7 de ", it:"7 di "},
            {es:"8 de ", en:"8 of ", pt:"8 de ", fr:"8 de ", it:"8 di "},
            {es:"9 de ", en:"9 of ", pt:"9 de ", fr:"9 de ", it:"9 di "},
            {es:"10 de ", en:"10 of ", pt:"10 de ", fr:"10 de ", it:"10 di "},
            {es:"Sota de ", en:"Page of ", pt:"Valete de ", fr:"Valet de ", it:"Fante di "},
            {es:"Caballero de ", en:"Knight of ", pt:"Cavaleiro de ", fr:"Chevalier de ", it:"Cavaliere di "},
            {es:"Reina de ", en:"Queen of ", pt:"Rainha de ", fr:"Reine de ", it:"Regina di "},
            {es:"Rey de ", en:"King of ", pt:"Rei de ", fr:"Roi de ", it:"Re di "}
        ];

        let idCounter = 0;

        // Cargar los 22 Arcanos Mayores con textos de interpretación multilingüe
        nombresArcanosMayores.forEach(arcano => {
            baseDeDatosTarot.push({
                id: idCounter++,
                nombres: arcano,
                significados: {
                    es: { derecho: "Energía equilibrada y un mensaje claro para tu camino.", reves: "Bloqueos temporales que requieren atención inmediata." },
                    en: { derecho: "Balanced energy and a clear message for your path.", reves: "Temporary blocks requiring immediate attention." },
                    pt: { derecho: "Energia equilibrada e uma mensagem clara para o seu caminho.", reves: "Bloqueios temporários que exigem atenção." },
                    fr: { derecho: "Énergie équilibrée et un message clair pour votre chemin.", reves: "Blocages temporaires qui nécessitent une attention." },
                    it: { derecho: "Energia equilibrata e un messaggio chiaro per il tuo cammino.", reves: "Blocchi temporanei che richiedono attenzione." }
                }
            });
        });

        // Cargar los 56 Arcanos Menores dinámicamente combinando números y palos
        palos.forEach(palo => {
            cartasNumero.forEach(num => {
                baseDeDatosTarot.push({
                    id: idCounter++,
                    nombres: {
                        es: num.es + palo.es,
                        en: num.en + palo.en,
                        pt: num.pt + palo.pt,
                        fr: num.fr + palo.fr,
                        it: num.it + palo.it
                    },
                    significados: {
                        es: { derecho: "Influencia práctica en tus decisiones diarias.", reves: "Falta de enfoque o retrasos en este aspecto." },
                        en: { derecho: "Practical influence on your daily choices.", reves: "Lack of focus or delays in this aspect." },
                        pt: { derecho: "Influência prática em suas decisões diárias.", reves: "Falta de foco ou atrasos neste aspecto." },
                        fr: { derecho: "Influence pratique sur vos choix quotidiens.", reves: "Manque de concentration ou retards." },
                        it: { derecho: "Influenza pratica sulle tue scelte quotidiane.", reves: "Mancanza di concentrazione o ritardi." }
                    }
                });
            });
        });

        function actualizarTextosGlobales() {
            const lang = document.getElementById('tarot-idioma').value;
            document.getElementById('txt-menu-tarot').innerText = textosIdiomas[lang].tituloMenu;
            document.getElementById('lbl-mazo').innerText = textosIdiomas[lang].mazo;
            document.getElementById('lbl-cantidad').innerText = textosIdiomas[lang].cantidad;
            document.getElementById('btn-comenzar').innerText = textosIdiomas[lang].consultar;
            document.getElementById('btn-nueva').innerText = textosIdiomas[lang].nueva;
        }

        function intentarActivarAudio() {
            const musica = document.getElementById('audio-musica');
            musica.play().catch(() => console.log("Audio esperando acción manual"));
        }

        function sonarCuencoUnico() {
            const cuenco = document.getElementById('audio-cuenco');
            cuenco.currentTime = 0;
            cuenco.play().catch(e => console.log("Audio bloqueado"));
        }

        function cambiarVista(idVista) {
            document.querySelectorAll('.vista-seccion').forEach(v => v.classList.remove('activa'));
            document.getElementById(idVista).classList.add('activa');
            
            const contenedor = document.getElementById('contenedor-global');
            if(idVista !== 'pantalla-menu') {
                contenedor.classList.add('modo-consulta-activa');
            } else {
                contenedor.classList.remove('modo-consulta-activa');
            }

            const zonaVolver = document.getElementById('zona-volver');
            if(idVista !== 'pantalla-menu') {
                zonaVolver.innerHTML = `<button class="btn-volver" onclick="irAlMenu()">←</button>`;
            } else {
                zonaVolver.innerHTML = '';
            }
        }

        function irAlMenu() { cambiarVista('pantalla-menu'); }
        function abrirTarotConfig() { cambiarVista('pantalla-tarot-config'); }

        function comenzarRitualTarot() {
            intentarActivarAudio();
            cartasSeleccionadasIndices = [];
            cartasRequeridas = parseInt(document.getElementById('tarot-tipo').value);
            const lang = document.getElementById('tarot-idioma').value;

            const txtInstruccion = document.getElementById('txt-contador-instruccion');
            if (cartasRequeridas === 1) {
                txtInstruccion.innerText = textosIdiomas[lang].eligeUna;
            } else {
                txtInstruccion.innerText = textosIdiomas[lang].eligeVarias;
            }
            
            let mazoOriginal = baseDeDatosTarot.map(c => {
                let esInvertida = Math.random() < 0.5;
                return { original: c, invertida: esInvertida };
            });
            mazoOriginal.sort(() => Math.random() - 0.5);
            mazoMezcladoConPosicion = mazoOriginal;

            const contenedorAltar = document.getElementById('altar-abanicos-completo');
            contenedorAltar.innerHTML = '';

            // Se muestran físicamente las 78 cartas reales en el tablero
            mazoMezcladoConPosicion.forEach((carta, i) => {
                let divCard = document.createElement('div');
                divCard.className = 'carta-tarot-real';
                divCard.id = `carta-index-${i}`;

                divCard.onclick = (evento) => {
                    evento.stopPropagation();
                    seleccionarCartaDelAbanico(i);
                };
                
                contenedorAltar.appendChild(divCard);
            });

            cambiarVista('pantalla-tarot-tablero');
        }

        function seleccionarCartaDelAbanico(idx) {
            let elementoHTML = document.getElementById(`carta-index-${idx}`);
            if(elementoHTML.classList.contains('elegida-ritual') || cartasSeleccionadasIndices.length >= cartasRequeridas) return;
            
            sonarCuencoUnico(); 
            elementoHTML.classList.add('elegida-ritual'); 
            cartasSeleccionadasIndices.push(mazoMezcladoConPosicion[idx]);

            if(cartasSeleccionadasIndices.length === cartasRequeridas) {
                setTimeout(() => revelarTiradaFinal(), 600);
            }
        }

        function revelarTiradaFinal() {
            const lang = document.getElementById('tarot-idioma').value;
            const mazoElegido = document.getElementById('tarot-mazo-elegido').value;
            const cajaRevelada = document.getElementById('caja-cartas-reveladas');
            const cajaTexto = document.getElementById('texto-interpretacion');
            cajaRevelada.innerHTML = '';
            
            let parrafosInterpretacion = "";

            cartasSeleccionadasIndices.forEach((cartaData, i) => {
                let cardObj = cartaData.original;
                let estaAlReves = cartaData.invertida;

                let orientacionTexto = estaAlReves ? textosIdiomas[lang].alreves : textosIdiomas[lang].derecho;
                let orientacionClase = estaAlReves ? "txt-alreves" : "txt-derecho";
                let significadoFinal = estaAlReves ? cardObj.significados[lang].reves : cardObj.significados[lang].derecho;
                let nombreTraducido = cardObj.nombres[lang];

                let divC = document.createElement('div');
                divC.className = `carta-revelada ${estaAlReves ? 'es-invertida' : ''}`;
                
                // Conecta de manera exacta con las carpetas de los 5 mazos
                divC.innerHTML = `
                    <div class="wrapper-imagen-tarot">
                        <img src="cartas/${mazoElegido}/${cardObj.id}.jpg" alt="${nombreTraducido}">
                    </div>
                    <div class="nombre-c">
                        ${nombreTraducido}
                        <span class="tag-orientacion ${orientacionClase}">${orientacionTexto}</span>
                    </div>
                `;
                cajaRevelada.appendChild(divC);

                parrafosInterpretacion += `<p><strong>✦ ${nombreTraducido} (${orientacionTexto}):</strong> ${significadoFinal}</p>`;
            });

            cajaTexto.innerHTML = parrafosInterpretacion;
            cambiarVista('pantalla-tarot-resultado');
        }
        
        actualizarTextosGlobales();
    </script>
</body>
</html>
