<html lang="es">

        body {
            background-color: #04010a;
            background-image: linear-gradient(180deg, #020104 0%, #080312 50%, #020104 100%);
            color: #f3e8ff;
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            padding: 0; margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 20px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 50px;
            z-index: 100;
            position: relative;
        }
        
        .btn-volver {
            background: rgba(15, 4, 35, 0.9);
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 6px;
            color: #d4af37;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-volver:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            background: rgba(212, 175, 55, 0.15);
        }

        .selector-idioma-derecho {
            position: absolute;
            top: 0;
            right: 0;
            width: 130px;
        }
        .selector-idioma-derecho select {
            width: 100%; background: #070314; border: 2px solid rgba(212, 175, 55, 0.5);
            color: #fff; padding: 6px; font-family: 'Cinzel Decorative', serif; font-size: 0.85rem; outline: none; border-radius: 6px;
        }

        .icono-app-contenedor {
            width: 75px;
            height: 75px;
            margin: 0 auto;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(14, 5, 30, 0.85);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            overflow: hidden;
        }
        .icono-app-contenedor img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-area { 
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .app-container.modo-consulta-activa .logo-area {
            display: none !important;
        }

        h1.marca-titulo {
            color: #d4af37; 
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem; 
            margin: 0; 
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .instruccion-directa {
            color: #d4af37;
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
            padding: 0 10px;
        }

        .vista-seccion { display: none; flex-direction: column; gap: 25px; width: 100%; }
        .activa { display: flex; }

        .menu-contenedor { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 20px; 
            margin-top: 15px; 
            max-width: 800px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
        }
        @media (max-width: 600px) {
            .menu-contenedor { grid-template-columns: 1fr; }
        }

        .menu-card {
            background: rgba(14, 5, 30, 0.85); 
            border: 2px solid rgba(212, 175, 55, 0.35); 
            border-bottom: 5px solid rgba(212, 175, 55, 0.6);
            padding: 30px 15px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s; 
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .menu-card:hover { border-color: #d4af37; background: rgba(45, 12, 95, 0.45); transform: translateY(-3px); }
        .card-titulo { font-size: 1.5rem; color: #d4af37; letter-spacing: 2px; }

        .config-ritual-area { display: flex; flex-direction: column; gap: 20px; margin-top: 10px; max-width: 500px; margin-left: auto; margin-right: auto; width: 100%; }
        .selector-caja { text-align: left; border-bottom: 2px dashed rgba(212, 175, 55, 0.2); padding-bottom: 12px; }
        .selector-caja label { display: block; font-size: 1.3rem; color: #d4af37; margin-bottom: 10px; }
        .selector-caja select {
            width: 100%; background: #070314; border: 2px solid rgba(212, 175, 55, 0.5);
            color: #fff; padding: 14px; font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; outline: none; border-radius: 6px;
        }

        /* ALTAR DE CARTAS GRANDE PARA COMPU Y AJUSTADO EN CELULAR */
        .contenedor-altar-abanicos {
            display: flex;
            flex-direction: column;
            gap: 55px;
            max-width: 100%;
            margin: 30px auto;
            width: 100%;
            padding-bottom: 40px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .tanda-abanico-fila {
            position: relative;
            height: 150px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Cartas grandes en la computadora */
        .carta-tarot-abanico {
            position: absolute;
            width: 80px;
            height: 140px;
            background: linear-gradient(135deg, #1b0a36 0%, #05020a 100%);
            border: 2px solid #4c1d95;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: rgba(212, 175, 55, 0.6);
            transform-origin: bottom center;
        }
        
        .carta-tarot-abanico:hover {
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.9);
            z-index: 999 !important;
            transform: translate3d(var(--hover-x), -20px, 0) scale(1.2) rotate(var(--rotacion-propia)) !important;
        }
        
        .carta-tarot-abanico.elegida-ritual {
            border-color: #d4af37;
            background: #31075a;
            box-shadow: 0 0 10px #d4af37;
            opacity: 0.1;
            pointer-events: none;
        }

        /* Adaptación exclusiva para pantallas chicas */
        @media (max-width: 600px) {
            .tanda-abanico-fila { height: 100px; }
            .carta-tarot-abanico { width: 48px; height: 85px; font-size: 0.8rem; }
        }

        .resultado-cartas { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; width: 100%; box-sizing: border-box; }
        
        /* Cartas finales grandes y estables */
        .carta-revelada {
            width: 160px; height: 280px; background: #06020c; border: 2px solid #d4af37; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 8px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            opacity: 0; animation: develaCarta 0.5s ease forwards;
        }
        
        .wrapper-imagen-tarot {
            width: 100%;
            height: 210px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: #000;
        }
        .wrapper-imagen-tarot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carta-revelada.es-invertida .wrapper-imagen-tarot img {
            transform: rotate(180deg);
        }

        .carta-revelada .nombre-c {
            font-weight: 700; color: #d4af37; font-size: 0.9rem; text-align: center; 
            line-height: 1.2; margin-top: 6px; width: 100%;
        }
        .carta-revelada .tag-orientacion {
            display: block; font-size: 0.75rem; font-family: sans-serif; letter-spacing: 0.5px; margin-top: 2px;
        }
        .tag-orientacion.txt-derecho { color: #34d399; }
        .tag-orientacion.txt-alreves { color: #f87171; }

            background: rgba(5, 2, 12, 0.95); border: 2px solid rgba(212, 175, 55, 0.4);
            border-top: 5px solid #d4af37; border-radius: 6px;
            padding: 20px; text-align: left; font-size: 1.05rem;
            line-height: 1.7; max-width: 750px; margin: 0 auto; max-height: 400px; overflow-y: auto;
            font-family: 'Georgia', serif;
            color: #fce7f3;
            box-sizing: border-box;
        }
        .caja-interpretacion h3 { font-family: 'Cinzel Decorative', serif; color: #d4af37; text-align: center; margin-top: 0; font-size: 1.3rem; letter-spacing: 1px; }
        .caja-interpretacion p { margin: 0 0 14px 0; text-align: justify; }
        
        .bloque-unificado {
            background: rgba(212, 175, 55, 0.07);
            border-left: 4px solid #d4af37;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 0 4px 4px 0;
        }

        .cartel-sino {
            text-align: center; font-size: 1.8rem; font-family: 'Cinzel Decorative', serif; margin-bottom: 15px; padding: 8px; border-radius: 6px;

        .sino-si { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.5); border: 1px solid #34d399; background: rgba(52, 211, 153, 0.1); }
        .sino-no { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.5); border: 1px solid #f87171; background: rgba(248, 113, 113, 0.1); }
        .sino-neutral { color: #c084fc; text-shadow: 0 0 10px rgba(192, 132, 252, 0.5); border: 1px solid #c084fc; background: rgba(192, 132, 252, 0.1); }

        .ads-box { background: rgba(0,0,0,0.3); border-top: 1px dashed rgba(212, 175, 55, 0.2); padding: 12px; color: #a78bfa; font-size: 0.9rem; margin-top: auto; }

        @keyframes develaCarta { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

        // FUNCION MAGICA QUE TRADUCE LOS TEXTOS AUTOMATICAMENTE AL IDIOMA SELECCIONADO
        function traducirTextoLectura(texto, idioma) {
            if (idioma === "es") return texto;
            const dic = diccionarioConceptos[idioma];
            if (!dic) return texto;
            
            let textoTraducido = texto;
            Object.keys(dic).forEach(clave => {
                const expresion = new RegExp(`\\b${clave}\\b`, 'g');
                textoTraducido = textoTraducido.replace(expresion, dic[clave]);
            });

            // Traducción básica de relleno para que las frases de los significados no queden en español puro
            if (idioma === "en") {
                textoTraducido = textoTraducido.replace(/y/g, "and").replace(/de/g, "of").replace(/con/g, "with").replace(/un/g, "a").replace(/una/g, "a");
            } else if (idioma === "pt") {
                textoTraducido = textoTraducido.replace(/y/g, "e").replace(/con/g, "com").replace(/un/g, "um").replace(/una/g, "uma");
            } else if (idioma === "fr") {
                textoTraducido = textoTraducido.replace(/y/g, "et").replace(/con/g, "avec").replace(/un/g, "un").replace(/una/g, "une");
            } else if (idioma === "it") {
                textoTraducido = textoTraducido.replace(/y/g, "e").replace(/con/g, "con").replace(/un/g, "un").replace(/una/g, "una");
            }
            return textoTraducido;
        }

            dibujarTableroAbanicos78();
            cambiarVista('pantalla-tarot-tablero');
        }

        function dibujarTableroAbanicos78() {
            const contenedorAltar = document.getElementById('altar-abanicos-contenedor');
            contenedorAltar.innerHTML = '';

            const cartasPorTanda = 13; 
            const totalTandas = 6;

            for (let t = 0; t < totalTandas; t++) {
                let filaAbanico = document.createElement('div');
                filaAbanico.className = 'tanda-abanico-fila';

                for (let i = 0; i < cartasPorTanda; i++) {
                    let mazoIndex = (t * cartasPorTanda) + i;
                    if (mazoIndex >= mazoMezcladoConPosicion.length) break;

                    let cartaData = mazoMezcladoConPosicion[mazoIndex];
                    let divCard = document.createElement('div');
                    divCard.className = 'carta-tarot-abanico';
                    divCard.innerHTML = '✦';

                    let indiceCentral = (cartasPorTanda - 1) / 2;
                    let desfasaje = i - indiceCentral;
                    
                    let anguloRotacion = desfasaje * 3.5; 
                    let desplazamientoX = desfasaje * 18; 
                    let desplazamientoY = Math.abs(desfasaje) * 3; 

                    divCard.style.setProperty('--rotacion-propia', `${anguloRotacion}deg`);
                    divCard.style.setProperty('--hover-x', `${desplazamientoX}px`);
                    
                    divCard.style.transform = `translate3d(${desplazamientoX}px, ${desplazamientoY}px, 0) rotate(${anguloRotacion}deg)`;
                    divCard.style.zIndex = i;

                    divCard.onclick = (evento) => {
                        evento.stopPropagation();
                        seleccionarCartaTableroDirecto(cartaData, divCard);
                    };

                    filaAbanico.appendChild(divCard);
                }
                contenedorAltar.appendChild(filaAbanico);
            }
        }

        function seleccionarCartaTableroDirecto(carta, elementoHTML) {
            if(elementoHTML.classList.contains('elegida-ritual') || cartasSeleccionadasIndices.length >= cartasRequeridas) return;
            
            sonarCuencoUnico(); 
            elementoHTML.classList.add('elegida-ritual'); 
            cartasSeleccionadasIndices.push(carta);

            if(cartasSeleccionadasIndices.length === cartasRequeridas) {
                setTimeout(() => revelarTiradaFinal(), 400);
            }
        }

        function calcularResultadoSino(cartas) {
            let puntosSino = 0; 
            cartas.forEach(c => {
                if (c.invertida) puntosSino--; 
                else {
                    if (c.original.polaridad === "si") puntosSino++;
                    else if (c.original.polaridad === "no") puntosSino--;
                }
            });
            if (cartas.length === 1) {
                if (cartas[0].invertida) return { txt: "NO", clase: "sino-no" };
                if (cartas[0].original.polaridad === "si") return { txt: "SÍ", clase: "sino-si" };
                return { txt: "NO", clase: "sino-no" };
            }
            if (puntosSino > 0) return { txt: "SÍ", clase: "sino-si" };
            if (puntosSino < 0) return { txt: "NO", clase: "sino-no" };
            return { txt: "NEUTRAL", clase: "sino-neutral" };
        }

        function generarInterpretacionUnificada(cartas) {
            const t = traduccionesGlobales[idiomaActual] || traduccionesGlobales["es"];
            if (cartas.length === 1) {
                return `<div class="bloque-unificado"><strong>Consejo:</strong> ${t.consejo1}</div>`;
            }

            let tieneInvertidas = cartas.some(c => c.invertida);
            let mayoriaMayores = cartas.filter(c => c.original.id < 22).length >= 2;

            if (cartas.length === 2) {
                if (tieneInvertidas) {
                    return `<div class="bloque-unificado"><strong>✦ Devolución:</strong> ${t.consejo2inv}</div>`;
                }
                return `<div class="bloque-unificado"><strong>✦ Devolución:</strong> ${t.consejo2der}</div>`;
            }

            if (cartas.length === 3) {
                if (mayoriaMayores) {
                    return `<div class="bloque-unificado"><strong>✦ Lectura Temporal:</strong> ${t.consejo3may}</div>`;
                }
                if (tieneInvertidas) {
                    return `<div class="bloque-unificado"><strong>✦ Lectura Temporal:</strong> ${t.consejo3inv}</div>`;
                }
                return `<div class="bloque-unificado"><strong>✦ Lectura Temporal:</strong> ${t.consejo3der}</div>`;
            }
            return "";
        }

        function revelarTiradaFinal() {
            const t = traduccionesGlobales[idiomaActual] || traduccionesGlobales["es"];
            
            const cajaRevelada = document.getElementById('caja-cartas-reveladas');
            const cajaTexto = document.getElementById('texto-interpretacion');
            const zonaCartel = document.getElementById('zona-cartel-sino');
            
            cajaRevelada.innerHTML = '';
            zonaCartel.innerHTML = '';
            
            let desgloseSignificados = "";

            if(modoLectura === "sino1" || modoLectura === "sino2") {
                let balance = calcularResultadoSino(cartasSeleccionadasIndices);
                zonaCartel.innerHTML = `<div class="cartel-sino ${balance.clase}">${t.respuesta} ${balance.txt}</div>`;
            }

            // LISTADO DE MAPEO DE IMÁGENES DE WIKIMEDIA COMMONS DE CONFANZA AL 100%
            const urlsFijasWikipedia = [
                "00_Fool", "01_Magician", "02_High_Priestess", "03_Empress", "04_Emperor", "05_Hierophant", "06_Lovers", "07_Chariot", "08_Strength", "09_Hermit", "10_Wheel_of_Fortune", "11_Justice", "12_Hanged_Man", "13_Death", "14_Temperance", "15_Devil", "16_Tower", "17_Star", "18_Moon", "19_Sun", "20_Judgement", "21_World",
                "Wands01", "Wands02", "Wands03", "Wands04", "Wands05", "Wands06", "Wands07", "Wands08", "Wands09", "Wands10", "Wands11", "Wands12", "Wands13", "Wands14",
                "Cups01", "Cups02", "Cups03", "Cups04", "Cups05", "Cups06", "Cups07", "Cups08", "Cups09", "Cups10", "Cups11", "Cups12", "Cups13", "Cups14",
                "Swords01", "Swords02", "Swords03", "Swords04", "Swords05", "Swords06", "Swords07", "Swords08", "Swords09", "Swords10", "Swords11", "Swords12", "Swords13", "Swords14",
                "Pents01", "Pents02", "Pents03", "Pents04", "Pents05", "Pents06", "Pents07", "Pents08", "Pents09", "Pents10", "Pents11", "Pents12", "Pents13", "Pents14"
            ];

            cartasSeleccionadasIndices.forEach((cartaData, index) => {
                let cObj = cartaData.original;
                let alReves = cartaData.invertida;

                let nombreOriginal = nombresCartas78[cObj.id];
                let nombreTraducido = traducirTextoLectura(nombreOriginal, idiomaActual);
                let orientacionTexto = alReves ? t.alreves : t.derecho;
                let orientacionClase = alReves ? "txt-alreves" : "txt-derecho";

                // IMAGEN PÚBLICA DIRECTA DE WIKIMEDIA COMMONS
                let nombreArchivoWiki = urlsFijasWikipedia[cObj.id];
                let urlImagenWikipedia = `https://upload.wikimedia.org/wikipedia/commons/f/f7/RWS_Tarot_${nombreArchivoWiki}.jpg`;

                let divC = document.createElement('div');
                divC.className = `carta-revelada ${alReves ? 'es-invertida' : ''}`;
                
                divC.innerHTML = `
                    <div class="wrapper-imagen-tarot">
                        <img src="${urlImagenWikipedia}" alt="${nombreTraducido}" onerror="this.style.display='none'; this.parentNode.innerHTML='<div style=\'color:#d4af37; padding-top:85px; font-size:0.9rem;\'>✦<br>ARCANA</div>';">
                    </div>
                    <div class="nombre-c">
                        ${nombreTraducido}
                        <span class="tag-orientacion ${orientacionClase}">${orientacionTexto}</span>
                    </div>
                `;
                cajaRevelada.appendChild(divC);

                let txtBase = alReves ? significadosInvertido78[cObj.id] : significadosDerecho78[cObj.id];
                let txtTraducidoSignificado = traducirTextoLectura(txtBase, idiomaActual);
                
                let tagPosicion = (modoLectura === "3") ? ` (${index===0?'Pasado':(index===1?'Presente':'Futuro')})` : "";
                
                desgloseSignificados += `<p><strong>✦ ${nombreTraducido}${tagPosicion}:</strong> ${txtTraducidoSignificado}</p>`;
            });

            let bloqueUnificadoFinal = generarInterpretacionUnificada(cartasSeleccionadasIndices);

            cajaTexto.innerHTML = `
                <h3>${t.tituloInterp}</h3>
                ${bloqueUnificadoFinal}
                <hr style="border:0; border-top:1px dashed rgba(212,175,55,0.3); margin:15px 0;">
                <div>${desgloseSignificados}</div>
            `;
            cambiarVista('pantalla-tarot-resultado');
        }
        
        actualizarTextosGlobales();
    </script>
</body>
</html>
