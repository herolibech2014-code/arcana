<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcana</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

        body {
            background-color: #04010a;
            background-image: linear-gradient(180deg, #020104 0%, #080312 50%, #020104 100%);
            color: #f3e8ff;
            font-family: 'Cinzel Decorative', serif;
            text-align: center;
            padding: 0; margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 25px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 50px;
            z-index: 100;
            position: relative;
        }
        
        .btn-volver {
            background: rgba(15, 4, 35, 0.9);
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 6px;
            color: #d4af37;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-volver:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            background: rgba(212, 175, 55, 0.15);
        }

        .selector-idioma-derecho {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
        }
        .selector-idioma-derecho select {
            width: 100%; background: #070314; border: 2px solid rgba(212, 175, 55, 0.5);
            color: #fff; padding: 8px; font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; outline: none; border-radius: 6px;
        }

        .icono-app-contenedor {
            width: 90px;
            height: 90px;
            margin: 0 auto;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(14, 5, 30, 0.85);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            overflow: hidden;
        }
        .icono-app-contenedor img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-area { 
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .app-container.modo-consulta-activa .logo-area {
            display: none !important;
        }

        h1.marca-titulo {
            color: #d4af37; 
            font-family: 'Cinzel Decorative', serif;
            font-size: 4rem; 
            margin: 0; 
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .instruccion-directa {
            color: #d4af37;
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin: 15px 0 5px 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .vista-seccion { display: none; flex-direction: column; gap: 30px; width: 100%; }
        .activa { display: flex; }

        .menu-contenedor { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 25px; 
            margin-top: 20px; 
            max-width: 800px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
        }
        @media (max-width: 600px) {
            .menu-contenedor { grid-template-columns: 1fr; }
        }

        .menu-card {
            background: rgba(14, 5, 30, 0.85); 
            border: 2px solid rgba(212, 175, 55, 0.35); 
            border-bottom: 5px solid rgba(212, 175, 55, 0.6);
            padding: 35px 15px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s; 
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .menu-card:hover { border-color: #d4af37; background: rgba(45, 12, 95, 0.45); transform: translateY(-3px); }
        .card-titulo { font-size: 1.8rem; color: #d4af37; letter-spacing: 3px; }

        .config-ritual-area { display: flex; flex-direction: column; gap: 25px; margin-top: 15px; max-width: 550px; margin-left: auto; margin-right: auto; width: 100%; }
        .selector-caja { text-align: left; border-bottom: 2px dashed rgba(212, 175, 55, 0.3); padding-bottom: 15px; }
        .selector-caja label { display: block; font-size: 1.5rem; color: #d4af37; margin-bottom: 12px; }
        .selector-caja select {
            width: 100%; background: #070314; border: 2px solid rgba(212, 175, 55, 0.5);
            color: #fff; padding: 18px; font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; outline: none; border-radius: 6px;
        }

        /* ALTAR TOTAL: LAS 78 CARTAS VISIBLES DE UNA VEZ */
        .grid-altar-completo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 12px;
            max-width: 1100px;
            margin: 20px auto;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .carta-tarot-real {
            width: 85px;
            height: 150px;
            background: linear-gradient(135deg, #1d0b3a 0%, #05020a 100%);
            border: 2px solid #4c1d95;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            color: rgba(212, 175, 55, 0.3);
        }
        .carta-tarot-real:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
        }
        
        .carta-tarot-real.elegida-ritual {
            border-color: #d4af37;
            background: #3b0764;
            box-shadow: 0 0 15px #d4af37;
            opacity: 0.15;
            pointer-events: none;
        }

        .resultado-cartas { display: flex; justify-content: center; gap: 25px; margin: 30px 0; flex-wrap: wrap; }
        
        .carta-revelada {
            width: 170px; height: 320px; background: #06020c; border: 2px solid #d4af37; border-radius: 8px;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 8px; box-sizing: border-box; box-shadow: 0 12px 35px rgba(0,0,0,0.95);
            opacity: 0; animation: develaCarta 0.6s ease forwards;
            overflow: hidden;
        }
        
        .wrapper-imagen-tarot {
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            background: #110724;
        }
        .wrapper-imagen-tarot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carta-revelada.es-invertida img {
            transform: rotate(180deg);
        }

        .carta-revelada .nombre-c {
            font-weight: 700; color: #d4af37; font-size: 0.95rem; text-align: center; 
            line-height: 1.2; margin-top: 5px; height: 34px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .carta-revelada .tag-orientacion {
            font-size: 0.75rem; font-family: sans-serif; letter-spacing: 1px; margin-top: 2px;
        }
        .tag-orientacion.txt-derecho { color: #34d399; }
        .tag-orientacion.txt-alreves { color: #f87171; }
        
        .caja-interpretacion {
            background: rgba(5, 2, 12, 0.95); border: 2px solid rgba(212, 175, 55, 0.4);
            border-top: 5px solid #d4af37; border-radius: 6px;
            padding: 25px; text-align: left; font-size: 1.15rem;
            line-height: 1.8; max-width: 750px; margin: 0 auto; max-height: 450px; overflow-y: auto;
            font-family: 'Georgia', serif;
            color: #fce7f3;
        }
        .caja-interpretacion h3 { font-family: 'Cinzel Decorative', serif; color: #d4af37; text-align: center; margin-top: 0; font-size: 1.5rem; letter-spacing: 2px; }
        .caja-interpretacion p { margin: 0 0 18px 0; text-align: justify; }
        
        .cartel-sino {

        .sino-no { color: #f87171; text-shadow: 0 0 15px rgba(248, 113, 113, 0.6); border: 1px solid #f87171; background: rgba(248, 113, 113, 0.1); }
        .sino-neutral { color: #c084fc; text-shadow: 0 0 15px rgba(192, 132, 252, 0.6); border: 1px solid #c084fc; background: rgba(192, 132, 252, 0.1); }

        .ads-box { background: rgba(0,0,0,0.3); border-top: 1px dashed rgba(212, 175, 55, 0.2); padding: 15px; color: #a78bfa; font-size: 1rem; margin-top: auto; }

        @keyframes develaCarta { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

        function cambiarVista(idVista) {
            document.querySelectorAll('.vista-seccion').forEach(v => v.classList.remove('activa'));
            document.getElementById(idVista).classList.add('activa');
            
            const contenedor = document.getElementById('contenedor-global');
            if(idVista !== 'pantalla-menu') {
                contenedor.classList.add('modo-consulta-activa');
                document.getElementById('contenedor-idioma').style.display = 'none';
            } else {
                contenedor.classList.remove('modo-consulta-activa');
                document.getElementById('contenedor-idioma').style.display = 'block';
            }

            const zonaVolver = document.getElementById('zona-volver');
            if(idVista !== 'pantalla-menu') {
                zonaVolver.innerHTML = `<button class="btn-volver" onclick="irAlMenu()">←</button>`;
            } else {
                zonaVolver.innerHTML = '';
            }
        }
