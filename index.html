            align-items: flex-start;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-user-select: none;

        }

            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 25px;
            position: relative;
        }

            justify-content: space-between;
            align-items: center;
            height: 50px;
            z-index: 100;
        }

            background: rgba(15, 4, 35, 0.9);
            border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 6px;
            color: #d4af37;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-volver:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            background: rgba(212, 175, 55, 0.15);
        }

        .logo-area { 
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .app-container.modo-consulta-activa .logo-area {
            display: none !important;
        }

        h1.marca-titulo {
            color: #d4af37; 
            font-size: 4rem; 
            margin: 0; 
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        .lema { 
            color: #c4b5fd; 
            font-size: 1.3rem; 
            letter-spacing: 5px; 
            margin: 0; 
        }

        .instruccion-directa {
            color: #d4af37;
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin: 15px 0 5px 0;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);

            flex-direction: column; 
            gap: 25px; 
            margin-top: 20px; 
            max-width: 600px; 
            margin-left: auto; 
            margin-right: auto; 
            width: 100%; 
        }
        .menu-card {

            border-bottom: 5px solid rgba(212, 175, 55, 0.6);

            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s; 
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);

        .card-titulo { font-size: 2.3rem; color: #d4af37; letter-spacing: 3px; }
        .card-desc { font-size: 1.1rem; color: #ddd6fe; margin-top: 12px; font-family: sans-serif; opacity: 0.9; }

            flex-direction: column;
            gap: 25px;
            width: 100%;
            margin-top: 10px;
            padding-bottom: 40px;

            position: relative;
            width: 100%;
            height: 180px;
            margin: 0 auto;
            display: flex;
            justify-content: center;

            border: 2px solid #5b21b6;
            border-radius: 6px;

            background: #4c1d95;
            box-shadow: 0 0 20px #d4af37;

            border: 1px solid rgba(212, 175, 55, 0.2);

        .wrapper-imagen-tarot img {
            width: 100%;
            height: 100%;

        }

</head>

        function cambiarVista(idVista) {
            document.querySelectorAll('.vista-seccion').forEach(v => v.classList.remove('activa'));
            document.getElementById(idVista).classList.add('activa');
            
            const contenedor = document.getElementById('contenedor-global');
            if(idVista !== 'pantalla-menu') {
                contenedor.classList.add('modo-consulta-activa');
            } else {
                contenedor.classList.remove('modo-consulta-activa');
            }

            const zonaVolver = document.getElementById('zona-volver');
            if(idVista !== 'pantalla-menu') {
                zonaVolver.innerHTML = `<button class="btn-volver" onclick="irAlMenu()">← Volver</button>`;
            } else {
                zonaVolver.innerHTML = '';
            }
        }

        function irAlMenu() { cambiarVista('pantalla-menu'); }
        function abrirTarotConfig() { cambiarVista('pantalla-tarot-config'); }

        function comenzarRitualTarot() {
            cartasSeleccionadasIndices = [];
            ritualEnProceso = false;

            // Se arma el mazo completo y se mezcla de forma aleatoria pura
            let mazoOriginal = mazoOficial78.map(c => ({ original: c, invertida: false }));
            mazoOriginal.sort(() => Math.random() - 0.5);
            mazoMezcladoConPosicion = mazoOriginal;

            const contenedorAbanicos = document.getElementById('altar-abanicos-completo');
            contenedorAbanicos.innerHTML = '';
            
            const cartasPorFila = 26; 
            const totalFilas = Math.ceil(mazoMezcladoConPosicion.length / cartasPorFila); 

            for (let f = 0; f < totalFilas; f++) {
                let divFila = document.createElement('div');
                divFila.className = 'abanico-fila';

                let inicioIdx = f * cartasPorFila;
                let finIdx = Math.min(inicioIdx + cartasPorFila, mazoMezcladoConPosicion.length);

                for (let i = inicioIdx; i < finIdx; i++) {
                    let divCard = document.createElement('div');
                    divCard.className = 'carta-tarot-real';
                    
                    let posRelativa = (i - inicioIdx) - ((finIdx - inicioIdx) - 1) / 2;
                    let traslacionX = posRelativa * 25;
                    let rotacionGiro = posRelativa * 2.5;

                    divCard.style.transform = `translateX(${traslacionX}px) rotate(${rotacionGiro}deg)`;
                    divCard.style.zIndex = i - inicioIdx;

                    divCard.onclick = () => seleccionarCartaDelAbanico(i, divCard);
                    divFila.appendChild(divCard);
                }
                contenedorAbanicos.appendChild(divFila);
            }

            cambiarVista('pantalla-tarot-tablero');
        }

        function seleccionarCartaDelAbanico(idx, elementoHTML) {
            if(ritualEnProceso || elementoHTML.classList.contains('elegida-ritual') || cartasSeleccionadasIndices.length >= cartasRequeridas) return;
            
            ritualEnProceso = true; 
            elementoHTML.classList.add('elegida-ritual'); 
            cartasSeleccionadasIndices.push(mazoMezcladoConPosicion[idx]);

            setTimeout(() => {
                ritualEnProceso = false; 
                if(cartasSeleccionadasIndices.length === cartasRequeridas) {
                    setTimeout(revelarTiradaFinal, 400);
                }
            }, 300);
        }

        function revelarTiradaFinal() {
            const cajaRevelada = document.getElementById('caja-cartas-reveladas');
            const cajaTexto = document.getElementById('texto-interpretacion');
            cajaRevelada.innerHTML = '';
            let parrafosInterpretacion = "";

            cartasSeleccionadasIndices.forEach((cartaData, i) => {
                let cardObj = cartaData.original;
                let divC = document.createElement('div');
                divC.className = 'carta-revelada';
                divC.innerHTML = `
                    <div class="wrapper-imagen-tarot">
                        <img src="${cardObj.url}" alt="${cardObj.es}" crossorigin="anonymous">
                    </div>
                    <div class="nombre-c">${cardObj.es}</div>
                `;
                cajaRevelada.appendChild(divC);

                parrafosInterpretacion += `<p><strong>✦ Carta ${i+1} (${obtenerPosicionTiempo(i)}): ${cardObj.es}</strong><br><strong>Significado:</strong> ${cardObj.significado}</p>`;
            });

            cajaTexto.innerHTML = parrafosInterpretacion;
            cambiarVista('pantalla-tarot-resultado');
        }

        function obtenerPosicionTiempo(i) {
            if(i === 0) return "Pasado";
            if(i === 1) return "Presente";
            return "Futuro";
        }
    </script>
