        function intentarActivarAudio() {
            const musica = document.getElementById('audio-musica');
            musica.play().catch(() => console.log("Audio en espera."));
        }

        function sonarCuencoUnico() {
            const cuenco = document.getElementById('audio-cuenco');
            cuenco.currentTime = 0;
            cuenco.play().catch(e => console.log("Bloqueado"));
        }

        function cambiarVista(idVista) {
            document.querySelectorAll('.vista-seccion').forEach(v => v.classList.remove('activa'));
            document.getElementById(idVista).classList.add('activa');
            
            const contenedor = document.getElementById('contenedor-global');
            if(idVista !== 'pantalla-menu') {
                contenedor.classList.add('modo-consulta-activa');
            } else {
                contenedor.classList.remove('modo-consulta-activa');
            }

            const zonaVolver = document.getElementById('zona-volver');
            if(idVista !== 'pantalla-menu') {
                zonaVolver.innerHTML = `<button class="btn-volver" onclick="irAlMenu()">← Volver</button>`;
            } else {
                zonaVolver.innerHTML = '';
            }
        }

        function irAlMenu() { cambiarVista('pantalla-menu'); }
        function abrirTarotConfig() { cambiarVista('pantalla-tarot-config'); }

        // MANTIENE LAS TANDAS DE ABANICOS CLÁSICAS Y SEPARADAS SIN TOCAR NADA
        function comenzarRitualTarot() {
            intentarActivarAudio();
            cartasSeleccionadasIndices = [];
            
            let mazoOriginal = baseDeDatosTarot.map(c => {
                let esInvertida = Math.random() < 0.5;
                return { original: c, invertida: esInvertida };
            });
            mazoOriginal.sort(() => Math.random() - 0.5);
            mazoMezcladoConPosicion = mazoOriginal;

            const mazoElegido = document.getElementById('tarot-mazo-elegido').value;
            const contenedorAltar = document.getElementById('altar-abanicos-completo');
            contenedorAltar.innerHTML = '';
            
            const cartasPorTanda = 4;
            const totalTandas = Math.ceil(mazoMezcladoConPosicion.length / cartasPorTanda);

            for (let t = 0; t < totalTandas; t++) {
                let divTandaFila = document.createElement('div');
                divTandaFila.className = 'abanico-tanda-fila';

                let inicio = t * cartasPorTanda;
                let fin = inicio + cartasPorTanda;

                for (let i = inicio; i < fin; i++) {
                    if (i >= mazoMezcladoConPosicion.length) break;

                    let divCard = document.createElement('div');
                    divCard.className = 'carta-tarot-real';
                    divCard.id = `carta-index-${i}`;
                    
                    let indiceRelativo = (i - inicio) - (cartasPorTanda - 1) / 2;
                    let despliegueX = indiceRelativo * 60;
                    let anguloGiro = indiceRelativo * 5;

                    divCard.style.transform = `translateX(${despliegueX}px) rotate(${anguloGiro}deg)`;
                    divCard.style.zIndex = i - inicio;

                    divCard.onclick = (evento) => {
                        evento.stopPropagation();
                        seleccionarCartaDelAbanico(i, mazoElegido);
                    };
                    
                    divTandaFila.appendChild(divCard);
                }
                contenedorAltar.appendChild(divTandaFila);
            }

            document.getElementById('txt-contador-instruccion').innerText = `Elegí tus 3 cartas del mazo (Llevás 0 de 3)`;
            cambiarVista('pantalla-tarot-tablero');
        }

        function seleccionarCartaDelAbanico(idx, mazoKey) {
            let elementoHTML = document.getElementById(`carta-index-${idx}`);
            if(elementoHTML.classList.contains('elegida-ritual') || cartasSeleccionadasIndices.length >= cartasRequeridas) return;
            
            sonarCuencoUnico(); // Sonido único por carta
            elementoHTML.classList.add('elegida-ritual'); 
            cartasSeleccionadasIndices.push(mazoMezcladoConPosicion[idx]);

            document.getElementById('txt-contador-instruccion').innerText = `Elegí tus 3 cartas del mazo (Llevás ${cartasSeleccionadasIndices.length} de 3)`;

            if(cartasSeleccionadasIndices.length === cartasRequeridas) {
                setTimeout(() => revelarTiradaFinal(mazoKey), 600);
            }
        }

        function revelarTiradaFinal(mazoKey) {
            const cajaRevelada = document.getElementById('caja-cartas-reveladas');
            const cajaTexto = document.getElementById('texto-interpretacion');
            cajaRevelada.innerHTML = '';
            
            let parrafosInterpretacion = "";
            let conteoMayores = 0;
            let conteoInvertidas = 0;
            let palosConteo = { bastos: 0, copas: 0, espadas: 0, oros: 0, ninguno: 0 };

            cartasSeleccionadasIndices.forEach((cartaData, i) => {
                let cardObj = cartaData.original;
                let estaAlReves = cartaData.invertida;

                if (cardObj.tipo === "Mayor") conteoMayores++;
                if (estaAlReves) conteoInvertidas++;
                palosConteo[cardObj.palo]++;

                // Selección dinámica según el mazo elegido de los 5
                let imagenUrl = cardObj.url_rider;
                if(mazoKey === 'marsella') imagenUrl = cardObj.url_marsella;
                if(mazoKey === 'egipcio') imagenUrl = cardObj.url_egipcio;
                if(mazoKey === 'gitano') imagenUrl = cardObj.url_gitano;
                if(mazoKey === 'celta') imagenUrl = cardObj.url_celta;

                let divC = document.createElement('div');
                divC.className = `carta-revelada ${estaAlReves ? 'es-invertida' : ''}`;
                
                let orientacionTexto = estaAlReves ? "Invertida" : "Derecha";
                let orientacionClase = estaAlReves ? "txt-alreves" : "txt-derecho";
                let significadoFinal = estaAlReves ? cardObj.reves : cardObj.derecho;

                divC.innerHTML = `
                    <div class="wrapper-imagen-tarot">
                        <img src="${imagenUrl}" alt="${cardObj.es}" crossorigin="anonymous">
                    </div>
                    <div class="nombre-c">
                        ${cardObj.es}
                        <span class="tag-orientacion ${orientacionClase}">${orientacionTexto}</span>
                    </div>
                `;
                cajaRevelada.appendChild(divC);

                parrafosInterpretacion += `<p><strong>✦ Carta ${i+1} (${obtenerPosicionTiempo(i)}): ${cardObj.es} (${orientacionTexto})</strong><br><strong>Mensaje del Destino:</strong> ${significadoFinal}</p>`;
            });

            let analisisConjunto = "<div class='seccion-conjunto'><strong>🔮 Dictamen Global de la Combinación:</strong><br>";
            
            if (conteoMayores === 3) {
                analisisConjunto += "Esta tirada está dominada por Arcanos Mayores. El universo te indica un cambio de destino drástico, espiritual e inevitable. Las fuerzas cósmicas superiores están operando a tu favor.";
            } else if (conteoInvertidas === 3) {
                analisisConjunto += "Las tres cartas han salido invertidas. Hay una gran resistencia interna o bloqueos energéticos severos que impiden el flujo natural de los eventos. Es hora de detenerse y revisar los miedos.";
            } else if (palosConteo['copas'] >= 2) {
                analisisConjunto += "Predominan las Copas. Las cartas hablan en conjunto de una resolución puramente emocional, guiada por los sentimientos, los vínculos afectivos y la intuición del corazón.";
            } else if (palosConteo['espadas'] >= 2) {
                analisisConjunto += "Predominan las Espadas. La combinación de fuerzas exige batallas mentales, toma de decisiones frías y cortes drásticos con situaciones del pasado.";
            } else if (palosConteo['bastos'] >= 2) {
                analisisConjunto += "Predominan los Bastos. El conjunto energético muestra que la solución radica en la acción directa, la pasión, los proyectos laborales en movimiento y tu fuego interior.";
            } else if (palosConteo['oros'] >= 2) {
                analisisConjunto += "Predominan los Oros. El universo responde con un claro mensaje de estabilidad material, herencias, negocios, salud física y la manifestación concreta en la tierra.";
            } else {
                analisisConjunto += "Las energías de la tirada se encuentran diversificadas y equilibradas. Diferentes áreas de tu vida (mente, emoción y materia) se entrelazan para darte una respuesta integral y armónica.";
            }
            analisisConjunto += "</div>";

            cajaTexto.innerHTML = parrafosInterpretacion + analisisConjunto;
            cambiarVista('pantalla-tarot-resultado');
        }

        function obtenerPosicionTiempo(i) {
            if(i === 0) return "Pasado";
            if(i === 1) return "Presente";
            return "Futuro";
        }
